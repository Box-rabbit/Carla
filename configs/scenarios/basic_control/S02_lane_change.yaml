scenario_id: S02_lane_change
category: basic_control
version: v0.1
description: 在多车道道路上根据指令完成向左变道
runtime:
  random_seed: 42
  carla_version: 0.9.10.1
  fixed_delta_seconds: 0.05
  max_duration_seconds: 120
map:
  town: Town04
  weather: ClearNoon
ego:
  vehicle_type: vehicle.tesla.model3
  spawn_point:
    x: 0.0
    y: 0.0
    z: 0.3
    yaw: 0.0
route:
  route_file: routes/basic_control/dongfeng_basic_control_example.xml
  route_id: 0
actors:
  vehicles: []
  pedestrians: []
  static_props: []
instructions:
- id: cmd_001
  trigger:
    type: time
    value: 5.0
  text_zh: 确认安全后向左变道
  text_en: Change to the left lane when it is safe.
  intent:
    type: lane_change
    direction: left
    target_relation: adjacent_left
    priority: normal
  expected_subtasks: []
success_criteria:
  no_collision: true
  lane_change:
    enabled: true
    direction: left
    target_relation: adjacent_left
    required_hold_seconds: 2.0
    max_completion_time_seconds: 20.0
  max_response_latency_ms: 150
failure_criteria:
  collision: true
  route_deviation: true
  lane_change_timeout: true
  blocked: true
  timeout: true
metrics:
  required:
  - lane_change_success
  - lane_change_duration_s
  - target_lane_hold_s
  - collision_count
  - response_latency_ms
