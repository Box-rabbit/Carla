description: Standalone scenario annotation bundle exported from the shared benchmark
  file.
available_scenarios:
- Town05:
  - scenario_id: S12_complex_obstacle_scene2_8km
    route_id: S12_complex_obstacle_scene2_8km
    scenario_type: ComplexObstacleScene2
    config_path: configs/S12_complex_obstacle_scene2_8km.yaml
    available_event_configurations:
    - trigger:
        type: route_distance
        distance_m: 0.0
        input_mode: none
      expected:
        intents:
        - PEDESTRIAN_CAUTION
        - LANE_CHANGE_LEFT
        - LANE_CHANGE_RIGHT
        - OVERTAKE
        - BUS_STOP_CAUTION
        target_progress_m: 8000
        no_collision: true
    - event_id: pedestrian_crossing
      trigger:
        type: route_distance
        distance_m: 280.0
        input_mode: wav
      expected:
        intents:
        - PEDESTRIAN_CAUTION
        - SLOW_DOWN
        target_speed_kmh: 0
        no_collision: true
    - event_id: slow_vehicle_overtake
      trigger:
        type: route_distance
        distance_m: 1090.0
        input_mode: wav
      expected:
        intents:
        - LANE_CHANGE_LEFT
        - LANE_CHANGE_RIGHT
        - OVERTAKE
        - SLOW_DOWN
        target_speed_kmh: 50
        no_collision: true
  - event_id: bus_stop_caution
    trigger:
      type: route_distance
      distance_m: 1720.0
      input_mode: wav
      expected:
        intents:
        - BUS_STOP_CAUTION
        - PEDESTRIAN_CAUTION
        - SLOW_DOWN
        - SLOW_DOWN_30
        target_speed_kmh: 30
        no_collision: true
